<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card — Back · Extra Clean Auto Detailing</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Sora', sans-serif;
    padding: 40px 24px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 24px;
  }

  .card-wrap {
    position: relative;
    width: 700px;
    height: 400px;
    border-radius: 12px;
    box-shadow:
      0 0 0 1px rgba(184,200,214,0.12),
      0 32px 80px rgba(0,0,0,0.8),
      0 8px 24px rgba(0,0,0,0.6);
    overflow: hidden;
    flex-shrink: 0;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #070809;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 100% 100%, rgba(18,36,72,0.55) 0%, transparent 60%),
      radial-gradient(ellipse at 0% 0%, rgba(14,28,56,0.30) 0%, transparent 50%);
    pointer-events: none; z-index: 1;
  }

  .watermark {
    position: absolute;
    right: -50px; top: 50%;
    transform: translateY(-50%);
    width: 300px; height: 300px;
    object-fit: contain;
    mix-blend-mode: screen;
    opacity: 0.045;
    z-index: 1; pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 2;
  }

  .corner {
    position: absolute;
    width: 14px; height: 14px; z-index: 4;
  }
  .corner-tl { top:13px; left:13px; border-top:1px solid rgba(184,200,214,0.22); border-left:1px solid rgba(184,200,214,0.22); }
  .corner-br { bottom:13px; right:13px; border-bottom:1px solid rgba(184,200,214,0.22); border-right:1px solid rgba(184,200,214,0.22); }

  /* ── INNER: 3 rows ── */
  .card-inner {
    position: relative; z-index: 3;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px 48px 30px;
  }

  /* ── NAME ── */
  .card-name {
    display: flex; flex-direction: column; gap: 3px;
  }
  .card-name-main {
    font-family: 'Cinzel', serif;
    font-size: 12.5px; font-weight: 500;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(200,216,228,0.88); line-height: 1;
  }
  .card-name-sub {
    font-family: 'Cinzel', serif;
    font-size: 8.5px; font-weight: 400;
    letter-spacing: 0.58em; text-transform: uppercase;
    color: rgba(130,155,172,0.5);
  }

  /* ── TAGLINE — single line, compact ── */
  .card-tagline-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  .rule-short {
    width: 32px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,200,214,0.38), transparent);
  }
  .card-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(210,226,238,0.88);
    white-space: nowrap;
  }
  .card-tagline em {
    font-style: italic; font-weight: 600;
    color: rgba(222,236,246,1);
  }
  .card-tagline .ellipsis {
    color: rgba(130,175,208,0.6);
    letter-spacing: 0.2em;
  }
  .rule-full {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, rgba(184,200,214,0.25), rgba(184,200,214,0.06), transparent);
  }

  /* ── CONTACT — 2×2 grid ── */
  .card-contact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 32px;
  }
  .contact-row {
    display: flex; align-items: center; gap: 9px;
  }
  .c-icon {
    width: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .c-icon svg {
    width: 11px; height: 11px;
    stroke: rgba(155,182,200,0.62);
    fill: none; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .c-icon svg.filled {
    fill: rgba(155,182,200,0.62); stroke: none;
  }
  .c-text {
    font-family: 'Sora', sans-serif;
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.04em;
    color: rgba(165,188,204,0.72);
    white-space: nowrap;
  }
  .c-text strong {
    font-weight: 500; color: rgba(200,218,230,0.9);
  }

  @media (max-width: 740px) {
    .card-wrap { width: 100%; max-width: 480px; height: auto; aspect-ratio: 1.75; }
    .card-inner { padding: 24px 28px 22px; }
    .card-tagline { font-size: 13px; }
    .card-contact { grid-template-columns: 1fr; gap: 7px; }
  }
</style>
</head>
